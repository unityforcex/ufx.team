<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
    <title>Peta Strategi UFX</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="img/ONEUNITY.png" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Ubuntu:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">

<style>
  body {
    font-family: sans-serif;
    background: #eee;
    text-align: center;
  }

  canvas {
    border: 2px solid #444;
    touch-action: none;
  }

  .toolbar {
    margin: 10px;
  }

  button, select, input {
    margin: 5px;
    padding: 8px;
    border: none;
    background: #ccc;
    border-radius: 6px;
    cursor: pointer;
  }

  button.active {
    background: #ff4444;
    color: white;
    font-weight: bold;
  }

  button:hover {
    opacity: 0.8;
  }
</style>
</head>

<body>

<h2>Peta Strategi By UFX 🔥</h2>

<select id="mapSelect">
  <option value="bermuda.jpg">Bermuda</option>
  <option value="purgatory.jpeg">Purgatory</option>
  <option value="kalahari.jpeg">Kalahari</option>
  <option value="alphine.jpeg">Alpine</option>
  <option value="nextera.jpeg">Nextera</option>
  <option value="soloara.jpg">Solara</option>
</select>

<div class="toolbar">
  <button id="dragBtn" onclick="setMode('drag')">Geser</button>
  <button id="drawBtn" onclick="setMode('draw')">Coret</button>
  <button id="addBtn" onclick="setMode('add')">Tambah</button>
  <button onclick="undo()">↩️ Undo</button>
  <button onclick="clearDrawing()">🧽 Clear</button>
  <button onclick="saveImage()">💾 Save</button>
  <br>

  🎨 <input type="color" id="colorPicker" value="#ff0000">
  📏 <input type="range" id="brushSize" min="1" max="10" value="3">
</div>

<canvas id="mapCanvas" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
const mapSelect = document.getElementById('mapSelect');

let mode = "drag";
let drawing = false;
let draggingMarker = null;

let color = "#ff0000";
let brushSize = 3;

const markers = [
  { x: 120, y: 150, radius: 8, label: "T" },
  { x: 200, y: 200, radius: 8, label: "R" }
];

let drawLines = [];
let history = []; // untuk undo

// ================= MAP =================
let img = new Image();
img.onload = draw;
img.src = mapSelect.value;

mapSelect.addEventListener('change', () => {
  img.src = mapSelect.value;
});

// ================= MODE =================
function setMode(m) {
  mode = m;

  document.querySelectorAll("button").forEach(b => b.classList.remove("active"));

  if (m === "drag") document.getElementById("dragBtn").classList.add("active");
  if (m === "draw") document.getElementById("drawBtn").classList.add("active");
  if (m === "add") document.getElementById("addBtn").classList.add("active");
}

// default aktif
setMode("drag");

// ================= DRAW =================
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  drawLines.forEach(line => {
    ctx.strokeStyle = line.color;
    ctx.lineWidth = line.size;
    ctx.beginPath();
    line.points.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.stroke();
  });

  markers.forEach(m => {
    ctx.beginPath();
    ctx.fillStyle = "rgba(255,0,0,0.6)";
    ctx.arc(m.x, m.y, m.radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "black";
    ctx.font = "bold 12px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(m.label, m.x, m.y);
  });
}

// ================= CORE =================
function getPos(e) {
  if (e.touches) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  }
  return { x: e.offsetX, y: e.offsetY };
}

// ================= EVENT =================
function start(e) {
  const pos = getPos(e);

  // simpan history
  saveHistory();

  if (mode === "drag") {
    draggingMarker = markers.find(m => {
      const dx = m.x - pos.x;
      const dy = m.y - pos.y;
      return Math.sqrt(dx*dx + dy*dy) < m.radius;
    });
  }

  else if (mode === "draw") {
    drawing = true;
    drawLines.push({
      color: color,
      size: brushSize,
      points: [{ x: pos.x, y: pos.y }]
    });
  }

  else if (mode === "add") {
    const label = prompt("Label marker:");
    if (label) {
      markers.push({
        x: pos.x,
        y: pos.y,
        radius: 8,
        label: label
      });
      draw();
    }
  }
}

function move(e) {
  const pos = getPos(e);

  if (mode === "drag" && draggingMarker) {
    draggingMarker.x = pos.x;
    draggingMarker.y = pos.y;
    draw();
  }

  if (mode === "draw" && drawing) {
    drawLines[drawLines.length - 1].points.push({
      x: pos.x,
      y: pos.y
    });
    draw();
  }
}

function end() {
  draggingMarker = null;
  drawing = false;
}

// ================= HISTORY =================
function saveHistory() {
  history.push({
    markers: JSON.parse(JSON.stringify(markers)),
    drawLines: JSON.parse(JSON.stringify(drawLines))
  });

  if (history.length > 20) history.shift(); // limit
}

function undo() {
  if (history.length === 0) return;

  const last = history.pop();
  markers.length = 0;
  markers.push(...last.markers);

  drawLines = last.drawLines;

  draw();
}

// ================= TOOL =================
function clearDrawing() {
  saveHistory();
  drawLines = [];
  draw();
}

function saveImage() {
  const link = document.createElement('a');
  link.download = "strategi_ff.png";
  link.href = canvas.toDataURL();
  link.click();
}

// ================= INPUT =================
document.getElementById('colorPicker').addEventListener('input', e => {
  color = e.target.value;
});

document.getElementById('brushSize').addEventListener('input', e => {
  brushSize = e.target.value;
});

// ================= LISTENER =================
canvas.addEventListener('mousedown', start);
canvas.addEventListener('mousemove', move);
canvas.addEventListener('mouseup', end);
canvas.addEventListener('mouseleave', end);

canvas.addEventListener('touchstart', start);
canvas.addEventListener('touchmove', move);
canvas.addEventListener('touchend', end);

</script>

</body>
</html>
